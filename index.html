<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WinWay Casino</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #1a1a1a;
            color: white;
            text-align: center;
            margin: 0;
            padding: 20px;
        }
        .balance {
            font-size: 24px;
            margin-bottom: 20px;
            color: #ffcc00;
        }
        .slot-machine {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
        }
        .slot {
            width: 80px;
            height: 100px;
            background: #333;
            border: 4px solid #555;
            border-radius: 10px;
            font-size: 50px;
            line-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        button {
            padding: 15px 40px;
            font-size: 20px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px #1e7e34;
        }
        button:active {
            box-shadow: 0 2px #1e7e34;
            transform: translateY(2px);
        }
        .result {
            margin-top: 20px;
            height: 30px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>🎰 WinWay Slots</h1>
    <div class="balance">Баланс: <span id="balance">1000</span> $</div>

    <div class="slot-machine">
        <div class="slot" id="slot1">🍒</div>
        <div class="slot" id="slot2">🍒</div>
        <div class="slot" id="slot3">🍒</div>
    </div>

    <button onclick="spin()">КРУТИТЬ (50$)</button>
    <div class="result" id="result"></div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    // Получаем данные о пользователе из Telegram
    const user = tg.initDataUnsafe?.user;
    const username = user ? user.first_name : "Игрок";
    
    // Пока что храним баланс в памяти телефона (LocalStorage)
    // Позже мы свяжем это с твоей базой данных
    let balance = parseInt(localStorage.getItem('casino_balance')) || 1000;

    document.getElementById('balance').innerText = balance;
    document.querySelector('h1').innerText = `🎰 WinWay: ${username}`;

    const symbols = ['🍒', '🍋', '🔔', '💎', '7️⃣'];

    function spin() {
        if (balance < 50) {
            document.getElementById('result').innerText = "Недостаточно средств!";
            return;
        }

        balance -= 50;
        saveBalance();
        document.getElementById('result').innerText = "Крутим...";

        setTimeout(() => {
            const s1 = symbols[Math.floor(Math.random() * symbols.length)];
            const s2 = symbols[Math.floor(Math.random() * symbols.length)];
            const s3 = symbols[Math.floor(Math.random() * symbols.length)];

            document.getElementById('slot1').innerText = s1;
            document.getElementById('slot2').innerText = s2;
            document.getElementById('slot3').innerText = s3;

            if (s1 === s2 && s2 === s3) {
                let win = 500;
                if (s1 === '7️⃣') win = 2000;
                balance += win;
                document.getElementById('result').innerText = `ВЫИГРЫШ: ${win}$! 🎉`;
                document.getElementById('result').style.color = "#ffcc00";
            } else {
                document.getElementById('result').innerText = "Попробуй еще раз!";
                document.getElementById('result').style.color = "white";
            }
            saveBalance();
        }, 500);
    }

    function saveBalance() {
        document.getElementById('balance').innerText = balance;
        localStorage.setItem('casino_balance', balance); // Сохраняем баланс в браузере
    }
</script>
