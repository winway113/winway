<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WinWay Casino</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #1a1a1a;
            color: white;
            text-align: center;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh; /* Занимает всю высоту экрана */
        }
        h1 {
            color: #ffcc00;
            margin-bottom: 10px;
            font-size: 36px;
        }
        .welcome-message {
            font-size: 18px;
            margin-bottom: 30px;
        }
        .games-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* 2 колонки */
            gap: 20px;
            max-width: 400px;
            width: 100%;
        }
        .game-item {
            background-color: #333;
            border: 2px solid #555;
            border-radius: 10px;
            padding: 20px;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.2s;
            font-size: 20px;
            font-weight: bold;
            color: #ccc;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            aspect-ratio: 1 / 1; /* Делает ячейки квадратными */
        }
        .game-item:hover {
            background-color: #444;
            transform: translateY(-5px);
        }
        .game-item.main {
            grid-column: span 2; /* Занимает две колонки */
            background-color: #28a745;
            color: white;
        }
        .game-item.main:hover {
            background-color: #1e7e34;
        }
        .game-item span {
            font-size: 40px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <h1>🎰 WinWay Casino</h1>
    <p class="welcome-message">Приветствуем тебя в нашем виртуальном казино!</p>

    <div class="games-grid">
        <div class="game-item main" onclick="openGame('slots')"><span>🎰</span> Слоты</div>
        <div class="game-item" onclick="openGame('roulette')"><span>🎡</span> Рулетка</div>
        <div class="game-item" onclick="openGame('cards')"><span>🃏</span> Карты</div>
        <div class="game-item" onclick="openGame('dice')"><span>🎲</span> Кости</div>
        <div class="game-item" onclick="openGame('lottery')"><span>🎟️</span> Лотерея</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); // Развернуть мини-приложение на весь экран

        function openGame(gameName) {
            // Здесь будет логика открытия конкретной игры
            // Пока просто выводим сообщение
            alert(`Открываем игру: ${gameName}`);
            
            // В будущем здесь будет переход на другую страницу или показ другого контента
            // Например: window.location.href = `/games/${gameName}.html`;
        }
    </script>
</body>
</html>
